<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Web Pertama Saya</title>
    <style>
        /* CSS Simple untuk mempercantik tampilan */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding: 50px;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.1);
            display: inline-block;
        }
        button {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Gatau</h1>
        <p>Gatau</p>
        <button onclick="sapaan()">Klik</button>
    </div>

    <script>
        // JavaScript Simple untuk interaksi button
        function sapaan() {
            alert("Halo! Terima kasih sudah mengklik tombol ini.");
        }
    </script>

</body>
</html>
